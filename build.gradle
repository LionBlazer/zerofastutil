def parseArrayListMetadata = { File javaFile ->
	final String source = javaFile.getText("UTF-8")
	final String ownerClass = javaFile.name.substring(0, javaFile.name.length() - ".java".length())
	final String iteratorClass = buildArrayListZeroAllocIteratorClassName.call(ownerClass)

	def packageMatcher = (source =~ /(?m)^package\s+([a-zA-Z0-9_.]+);/)
	if (!packageMatcher.find()) {
		throw new GradleException("Cannot find package declaration in ${javaFile}")
	}
	final String packageName = packageMatcher.group(1)
	final String packageLeaf = packageName.substring(packageName.lastIndexOf('.') + 1)

	def classDeclMatcher = (source =~ ("public class\\s+" + java.util.regex.Pattern.quote(ownerClass) + "\\s*(<[^>]+>)?\\s+extends"))
	if (!classDeclMatcher.find()) {
		throw new GradleException("Cannot find class declaration for ${ownerClass} in ${javaFile}")
	}
	final String typeDecl = classDeclMatcher.group(1) ?: ""
	final String typeArgs = extractTypeArgsFromTypeDecl.call(typeDecl)
	final String ownerTypeUse = ownerClass + typeArgs
	final String iteratorTypeUse = iteratorClass + typeArgs

	def listIteratorMatcher = (source =~ /public\s+([A-Za-z0-9_<>, ?]+)\s+listIterator\(final int index\)\s*\{/)
	if (!listIteratorMatcher.find()) {
		throw new GradleException("Cannot find listIterator(int) declaration in ${javaFile}")
	}
	final String iteratorInterface = normalizeZeroAllocIteratorInterface.call(listIteratorMatcher.group(1).trim())

	final boolean objectLike = packageLeaf == "objects"
	final String typeCap = objectLike ? "Object" : packageLeaf.substring(0, packageLeaf.length() - 1).capitalize()
	final String zeroAllocIteratorType = objectLike ? "it.unimi.dsi.fastutil.ZeroAllocIterator<${typeArgs ? typeArgs.substring(1, typeArgs.length() - 1).trim() : "Object"}>" : buildPrimitiveZeroAllocIteratorType.call(typeCap)
	final String nextReturnType = objectLike ? (typeArgs ? typeArgs.substring(1, typeArgs.length() - 1).trim() : "Object") : typeCapToPrimitiveType[typeCap]
	final String nextMethod = objectLike ? "next" : "next${typeCap}"

	[
		ownerClass: ownerClass,
		iteratorClass: iteratorClass,
		packageName: packageName,
		typeDecl: typeDecl,
		typeArgs: typeArgs,
		ownerTypeUse: ownerTypeUse,
		iteratorTypeUse: iteratorTypeUse,
		iteratorInterface: iteratorInterface,
		zeroAllocIteratorType: zeroAllocIteratorType,
		nextReturnType: nextReturnType,
		nextMethod: nextMethod
	]
}

def buildArrayListZeroAllocIteratorClassSource = { Map meta ->
	final String staticTypeParams = meta.typeDecl ? meta.typeDecl + " " : ""

	return shortenQualifiedTypeReferences.call("""package ${meta.packageName};

import java.util.ArrayDeque;
import java.util.NoSuchElementException;

/** Reusable, zero-alloc iterator for {@link ${meta.ownerClass}}. */
public final class ${meta.iteratorClass}${meta.typeDecl} implements ${meta.iteratorInterface}, ${meta.zeroAllocIteratorType} {
	private static final ThreadLocal<ArrayDeque<${meta.iteratorClass}>> POOL = ThreadLocal.withInitial(ArrayDeque::new);

	private ${meta.ownerTypeUse} owner;
	private boolean inUse;
	private int expectedSize;
	private int index;

	@SuppressWarnings("unchecked")
	static ${staticTypeParams}${meta.iteratorTypeUse} acquire(final ${meta.ownerTypeUse} owner) {
		final ArrayDeque<${meta.iteratorClass}> pool = POOL.get();
		${meta.iteratorClass} iterator = pool.pollFirst();
		if (iterator == null) iterator = new ${meta.iteratorClass}${meta.typeArgs}();
		iterator.open(owner);
		return (${meta.iteratorTypeUse})iterator;
	}

	void open(final ${meta.ownerTypeUse} owner) {
		if (inUse) throw new IllegalStateException("Iterator already in use.");
		this.owner = owner;
		inUse = true;
		expectedSize = owner.size;
		index = 0;
	}

	private void ensureOpenAndUnmodified() {
		if (!inUse) throw new IllegalStateException("Iterator is not in use.");
		if (expectedSize != owner.size) throw new IllegalStateException("List was structurally modified during zero-alloc iteration.");
	}

	@Override
	public boolean hasNext() {
		ensureOpenAndUnmodified();
		return index < owner.size;
	}

	@Override
	public ${meta.nextReturnType} ${meta.nextMethod}() {
		ensureOpenAndUnmodified();
		if (index >= owner.size) throw new NoSuchElementException();
		return owner.a[index++];
	}

	@Override
	public void remove() {
		throw new UnsupportedOperationException("remove");
	}

	@Override
	public void close() {
		if (!inUse) throw new IllegalStateException("Iterator is not in use.");
		inUse = false;
		index = 0;
		owner = null;
		POOL.get().offerFirst(this);
	}
}
""", meta.packageName)
}

def injectArrayListZeroAllocIteratorApi = { File javaFile, Map meta ->
	String source = javaFile.getText("UTF-8")
	if (source.contains("${meta.iteratorClass}.acquire(this)")) {
		return false
	}

	final String zeroAllocMethods = """
	/** Borrows a zero-alloc pooled iterator.
	 *
	 * <p>The iterator must be closed after use to return it back to the current thread pool.
	 */
	public ${meta.iteratorTypeUse} poolZeroAllocIterator() {
		return ${meta.iteratorClass}.acquire(this);
	}
"""

	def markerMatcher = (source =~ /(?m)^\t@Override\s*\n\tpublic [A-Za-z0-9_<>, ?]+\s+listIterator\(final int index\)\s*\{/)
	if (!markerMatcher.find()) {
		throw new GradleException("Cannot find listIterator(int) section in ${javaFile}")
	}

	source = source.substring(0, markerMatcher.start()) + zeroAllocMethods + "\n" + source.substring(markerMatcher.start())
	javaFile.write(source, "UTF-8")
	return true
}

