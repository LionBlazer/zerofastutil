	public void sort(final ${comparatorType} comp, final ${arraysClass}.StableSortBuffer buffer) {
		if (comp == null) {
			${arraysClass}.stableSort(a, 0, size, buffer);
		} else {
			${arraysClass}.stableSort(a, 0, size, comp, buffer);
		}
	}

	public void sortWithBuffer(final ${arraysClass}.StableSortBuffer buffer) {
		sort(null, buffer);
	}
"""

	source = replaceFirstMethod(
		source,
		/public void sort\(final [^)]+ comp\)\s*\{/,
		sortMethods,
		javaFile,
		"array-list sort"
	)

	javaFile.write(source, "UTF-8")
	return true
