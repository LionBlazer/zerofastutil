def patchGeneratedArraysStableSort = { File javaFile ->
	String source = javaFile.getText("UTF-8")
	if (source.contains("class StableSortBuffer") && source.contains("newStableSortBuffer(")) {
		return false
	}

	final boolean objectArrays = javaFile.name == "ObjectArrays.java"
	String primitiveElementType = null
	if (!objectArrays) {
		def primitiveTypeMatcher = (source =~ /public static final ([^\[]+)\[] EMPTY_ARRAY = \{\};/)
		if (!primitiveTypeMatcher.find()) {
			throw new GradleException("Cannot determine primitive element type for ${javaFile}")
		}
		primitiveElementType = primitiveTypeMatcher.group(1).trim()
	}

	def defaultEmptyMatcher = (source =~ /public static final [^;]+ DEFAULT_EMPTY_ARRAY = \{\};\s*/)
	if (!defaultEmptyMatcher.find()) {
		throw new GradleException("Cannot find DEFAULT_EMPTY_ARRAY in ${javaFile}")
	}

	final String bufferSupportBlock = objectArrays ? """
	public static final class StableSortBuffer<K> {
		private K[] support;

		@SuppressWarnings("unchecked")
		public StableSortBuffer() {
			this(0);
		}

		@SuppressWarnings("unchecked")
		public StableSortBuffer(final int initialCapacity) {
			if (initialCapacity < 0) throw new IllegalArgumentException("Negative initialCapacity: " + initialCapacity);
			support = (K[])(initialCapacity == 0 ? EMPTY_ARRAY : new Object[initialCapacity]);
		}

		public int capacity() {
			return support.length;
		}

		@SuppressWarnings("unchecked")
		private K[] prepare(final K[] source, final int from, final int to) {
			Arrays.ensureFromTo(source.length, from, to);
			if (support.length < to) support = (K[])new Object[to];
			System.arraycopy(source, from, support, from, to - from);
			return support;
		}
	}

	public static <K> StableSortBuffer<K> newStableSortBuffer() {
		return new StableSortBuffer<K>();
	}

	public static <K> StableSortBuffer<K> newStableSortBuffer(final int initialCapacity) {
		return new StableSortBuffer<K>(initialCapacity);
	}
""" : """
	public static final class StableSortBuffer {
		private ${primitiveElementType}[] support;

		public StableSortBuffer() {
			this(0);
		}

		public StableSortBuffer(final int initialCapacity) {
			if (initialCapacity < 0) throw new IllegalArgumentException("Negative initialCapacity: " + initialCapacity);
			support = initialCapacity == 0 ? EMPTY_ARRAY : new ${primitiveElementType}[initialCapacity];
		}

		public int capacity() {
			return support.length;
		}

		private ${primitiveElementType}[] prepare(final ${primitiveElementType}[] source, final int from, final int to) {
			Arrays.ensureFromTo(source.length, from, to);
			if (support.length < to) support = new ${primitiveElementType}[to];
			System.arraycopy(source, from, support, from, to - from);
			return support;
		}
	}

	public static StableSortBuffer newStableSortBuffer() {
		return new StableSortBuffer();
	}

	public static StableSortBuffer newStableSortBuffer(final int initialCapacity) {
		return new StableSortBuffer(initialCapacity);
	}
"""

	source = source.substring(0, defaultEmptyMatcher.end()) + "\n" + bufferSupportBlock + source.substring(defaultEmptyMatcher.end())

	def naturalSortMatcher = (source =~ /public static(?:\s+<K>)?\s+void stableSort\(final ([^,\s]+)\s+a\[\], final int from, final int to\)\s*\{/)
	if (!naturalSortMatcher.find()) {
		throw new GradleException("Cannot find natural stableSort(from, to) in ${javaFile}")
	}
	final String arrayElementType = naturalSortMatcher.group(1).trim()
	final boolean genericMethods = naturalSortMatcher.group(0).contains("<K>")

	def comparatorSortMatcher = (source =~ /public static(?:\s+<K>)?\s+void stableSort\(final [^,\s]+\s+a\[\], final int from, final int to, ([^)]*?) comp\)\s*\{/)
	if (!comparatorSortMatcher.find()) {
		throw new GradleException("Cannot find comparator stableSort(from, to, comp) in ${javaFile}")
	}
	final String comparatorType = comparatorSortMatcher.group(1).trim()
	final String genericPrefix = genericMethods ? "<K> " : ""
	final String bufferType = objectArrays ? "StableSortBuffer<K>" : "StableSortBuffer"

	final String additionalStableSortMethods = """
	public static ${genericPrefix}void stableSort(final ${arrayElementType} a[], final int from, final int to, final ${bufferType} buffer) {
		mergeSort(a, from, to, java.util.Objects.requireNonNull(buffer, "buffer").prepare(a, from, to));
	}

	public static ${genericPrefix}void stableSort(final ${arrayElementType} a[], final ${bufferType} buffer) {
		stableSort(a, 0, a.length, buffer);
	}

	public static ${genericPrefix}void stableSort(final ${arrayElementType} a[], final int from, final int to, ${comparatorType} comp, final ${bufferType} buffer) {
		if (comp == null) {
			stableSort(a, from, to, buffer);
			return;
		}
		mergeSort(a, from, to, comp, java.util.Objects.requireNonNull(buffer, "buffer").prepare(a, from, to));
	}

	public static ${genericPrefix}void stableSort(final ${arrayElementType} a[], ${comparatorType} comp, final ${bufferType} buffer) {
		stableSort(a, 0, a.length, comp, buffer);
	}
"""

	source = source.substring(0, naturalSortMatcher.start()) + additionalStableSortMethods + "\n" + source.substring(naturalSortMatcher.start())

	javaFile.write(source, "UTF-8")
	return true
}

