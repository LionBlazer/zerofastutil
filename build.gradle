	if (simpleName == "ObjectIterable") {
		if (!source.contains("import it.unimi.dsi.fastutil.ZeroAllocIterable;")) {
			source = source.replace("import java.lang.Iterable;\n", "import java.lang.Iterable;\nimport it.unimi.dsi.fastutil.ZeroAllocIterable;\n")
		}
		source = source.replace("public interface ObjectIterable<K> extends Iterable<K> {", "public interface ObjectIterable<K> extends Iterable<K>, ZeroAllocIterable<K> {")
		source = source.replace("\t@Override\n\tObjectIterator<K> iterator();\n", """\t@Override
\tObjectIterator<K> iterator();

\t@Override
	\tdefault it.unimi.dsi.fastutil.ZeroAllocIterator<K> poolZeroAllocIterator() {
	\t\treturn it.unimi.dsi.fastutil.ZeroAllocIterable.wrap(this);
	\t}
	""")
		source = shortenQualifiedTypeReferences.call(source, packageName)
		javaFile.write(source, "UTF-8")
		return true
	}

	final String typeCap = simpleName.substring(0, simpleName.length() - "Iterable".length())
	source = source.replace("public interface ${simpleName} extends Iterable<${primitiveToBoxedType[typeCap.toLowerCase()]}> {", "public interface ${simpleName} extends Iterable<${primitiveToBoxedType[typeCap.toLowerCase()]}>, ${typeCap}ZeroAllocIterable {")
	source = source.replace("\t@Override\n\t${typeCap}Iterator iterator();\n", """\t@Override
\t${typeCap}Iterator iterator();

\t@Override
	\tdefault ${typeCap}ZeroAllocIterator poolZeroAllocIterator() {
	\t\treturn ${typeCap}ZeroAllocIterable.wrap(this);
	\t}
	""")
	source = shortenQualifiedTypeReferences.call(source, packageName)
	javaFile.write(source, "UTF-8")
	return true
}

