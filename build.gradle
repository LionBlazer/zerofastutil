	final boolean genericComparator = comparatorType.contains("Comparator<? super")
	String genericType = null
	if (genericComparator) {
		def classGenericMatcher = (source =~ /public class [A-Za-z0-9_]+<([A-Za-z0-9_]+)>/)
		genericType = classGenericMatcher.find() ? classGenericMatcher.group(1).trim() : "K"
	}

	final String sortMethods = genericComparator ? """
public void sort(final ${comparatorType} comp) {
