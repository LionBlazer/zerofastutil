tasks.register("prepareFallbackSources", Sync) {
	group = "build setup"
	description = "Prepare missing generated sources from upstream fastutil sources."
	onlyIf { !useLocalGeneratedSources }
	into(fallbackMainSourcesPath)
	duplicatesStrategy = DuplicatesStrategy.EXCLUDE
	from({
		zipTree(configurations.fastutilSources.singleFile)
	}) {
		include("**/*.java")
		eachFile { details ->
			if (file("${srcDirName}/${details.path}").exists()) {
				details.exclude()
			}
		}
	}
	includeEmptyDirs = false
	doLast {
		int patchedMaps = 0
		int generatedMapIterators = 0
		int generatedMapProjectionIterators = 0
		int patchedSets = 0
		int generatedSetIterators = 0
		int patchedIterables = 0
		int patchedMapInterfaces = 0
		int patchedArrays = 0
		int patchedListInterfaces = 0
		int patchedArrayLists = 0
		int generatedArrayListIterators = 0
		fileTree(destinationDir).matching { include("**/*.java") }.files.each { File javaFile ->
			if (isGeneratedOpenHashMapFile.call(javaFile)) {
				final Map meta = parseOpenHashMapMetadata.call(javaFile)
				if (injectZeroAllocIteratorApi.call(javaFile, meta)) {
					patchedMaps++
				}
				if (injectZeroAllocMapViewApi.call(javaFile, meta)) {
					patchedMaps++
				}
				final File iteratorFile = new File(javaFile.parentFile, "${meta.iteratorClass}.java")
				iteratorFile.write(buildZeroAllocIteratorClassSource.call(meta), "UTF-8")
				generatedMapIterators++
				final File keyIteratorFile = new File(buildPackageDirectory.call(destinationDir, meta.keyProjectionPackageName), "${meta.keyProjectionIteratorClass}.java")
				keyIteratorFile.parentFile.mkdirs()
				keyIteratorFile.write(buildZeroAllocMapProjectionIteratorClassSource.call(meta, "key"), "UTF-8")
				final File valueIteratorFile = new File(buildPackageDirectory.call(destinationDir, meta.valueProjectionPackageName), "${meta.valueProjectionIteratorClass}.java")
				final File legacyValueIteratorFile = new File(javaFile.parentFile, "${meta.valueProjectionIteratorClass}.java")
				if (legacyValueIteratorFile.absolutePath != valueIteratorFile.absolutePath && legacyValueIteratorFile.exists()) {
					legacyValueIteratorFile.delete()
				}
				valueIteratorFile.parentFile.mkdirs()
				valueIteratorFile.write(buildZeroAllocMapProjectionIteratorClassSource.call(meta, "value"), "UTF-8")
				generatedMapProjectionIterators += 2
			}
			if (isGeneratedOpenHashSetFile.call(javaFile)) {
				final Map meta = parseOpenHashSetMetadata.call(javaFile)
				if (injectZeroAllocSetIteratorApi.call(javaFile, meta)) {
					patchedSets++
				}
				final File iteratorFile = new File(javaFile.parentFile, "${meta.iteratorClass}.java")
				iteratorFile.write(buildZeroAllocSetIteratorClassSource.call(meta), "UTF-8")
				generatedSetIterators++
			}
			if (isGeneratedIterableFile.call(javaFile)) {
				if (patchGeneratedIterableZeroAllocApi.call(javaFile)) {
					patchedIterables++
				}
			}
			if (isGeneratedMapInterfaceFile.call(javaFile)) {
				if (patchGeneratedMapInterfaceZeroAllocApi.call(javaFile)) {
					patchedMapInterfaces++
				}
			}
			if (isGeneratedArraysFile.call(javaFile)) {
				if (patchGeneratedArraysStableSort.call(javaFile)) {
					patchedArrays++
				}
			}
			if (isGeneratedListInterfaceFile.call(javaFile)) {
				if (patchGeneratedListSortApi.call(javaFile)) {
					patchedListInterfaces++
				}
			}
			if (isGeneratedArrayListFile.call(javaFile)) {
				final Map meta = parseArrayListMetadata.call(javaFile)
				if (injectArrayListZeroAllocIteratorApi.call(javaFile, meta)) {
					patchedArrayLists++
				}
				final File iteratorFile = new File(javaFile.parentFile, "${meta.iteratorClass}.java")
				iteratorFile.write(buildArrayListZeroAllocIteratorClassSource.call(meta), "UTF-8")
				generatedArrayListIterators++
				if (patchGeneratedArrayListSortApi.call(javaFile)) {
					patchedArrayLists++
				}
			}
		}
		logger.lifecycle("Injected allocation-free iterator API into ${patchedMaps} generated OpenHashMap classes and generated ${generatedMapIterators} entry iterator classes plus ${generatedMapProjectionIterators} key/value iterator classes.")
		logger.lifecycle("Injected allocation-free iterator API into ${patchedSets} generated OpenHashSet classes and generated ${generatedSetIterators} set iterator classes.")
		logger.lifecycle("Injected allocation-free iterable hierarchy into ${patchedIterables} generated *Iterable interfaces.")
		logger.lifecycle("Injected allocation-free iterable hierarchy into ${patchedMapInterfaces} generated *Map interfaces.")
		logger.lifecycle("Injected allocation-free stable-sort support into ${patchedArrays} generated *Arrays classes.")
		logger.lifecycle("Injected allocation-free list sort API into ${patchedListInterfaces} generated *List interfaces and ${patchedArrayLists} generated *ArrayList classes, plus ${generatedArrayListIterators} generated pooled ArrayList iterator classes.")
	}
}

sourceSets {
	main {
		if (useLocalGeneratedSources) {
			java.setSrcDirs([srcDirName])
		} else {
			// Keep src as source root in IDE and add fallback-generated type-specific classes.
			java.setSrcDirs([srcDirName, fallbackMainSourcesPath])
		}
	}
	test {
		java.setSrcDirs([testDirName])
	}
}

tasks.withType(JavaCompile).configureEach {
	options.encoding = "UTF-8"
	options.compilerArgs += ["-Xlint:all"]
}

tasks.named("compileJava") {
	if (!useLocalGeneratedSources) {
		dependsOn(tasks.named("prepareFallbackSources"))
	}
}

tasks.named("javadoc", Javadoc) {
	if (!useLocalGeneratedSources) {
		dependsOn(tasks.named("prepareFallbackSources"))
	}
	options.encoding = "UTF-8"
	options.addStringOption("Xdoclint:none", "-quiet")
}

tasks.named("sourcesJar", Jar) {
	if (!useLocalGeneratedSources) {
		dependsOn(tasks.named("prepareFallbackSources"))
	}
}

tasks.named("jar", Jar) {
	archiveBaseName = publishedArtifactId
	archiveVersion = project.version.toString()
	manifest {
		attributes("Automatic-Module-Name": "it.unimi.dsi.fastutil")
	}
}

tasks.register("releaseJar", Copy) {
	group = "build"
	description = "Copy final JAR to project root (${publishedArtifactId}-<version>.jar)."
	dependsOn(tasks.named("jar"))
	from(tasks.named("jar").flatMap { it.archiveFile })
	into(layout.projectDirectory)
}

tasks.register("dist", Copy) {
	group = "build"
	description = "Collect distribution artifacts in dist/lib."
	dependsOn(tasks.named("jar"), tasks.named("sourcesJar"), tasks.named("javadocJar"))
	into(layout.projectDirectory.dir("dist/lib"))
	from(tasks.named("jar").flatMap { it.archiveFile })
	from(tasks.named("sourcesJar").flatMap { it.archiveFile })
	from(tasks.named("javadocJar").flatMap { it.archiveFile })
}

tasks.named("assemble") {
	dependsOn(tasks.named("jar"))
}

tasks.named("test", Test) {
	useJUnit()
	maxHeapSize = "3g"
	enableAssertions = true
	testLogging {
		events("failed", "skipped")
	}
}

publishing {
	publications {
		mavenJava(MavenPublication) {
			from(components.java)
			artifactId = publishedArtifactId
			pom {
				name = projectDisplayName
				description = projectDescriptionText
				url = projectUrl
				licenses {
					license {
						name = "The Apache License, Version 2.0"
						url = "https://www.apache.org/licenses/LICENSE-2.0.txt"
					}
				}
				developers {
					developer {
						id = developerId
						name = developerName
						email = developerEmail
					}
				}
				scm {
					connection = scmConnection
					developerConnection = scmDeveloperConnection
					url = scmUrl
				}
			}
		}
	}
}

signing {
	def signingKey = findProperty("signingKey") ?: localSecrets.getProperty("signingKey")
	def signingKeyFile = findProperty("signingKeyFile") ?: localSecrets.getProperty("signingKeyFile")
	def signingPassword = findProperty("signingPassword") ?: localSecrets.getProperty("signingPassword")
	if (!signingKey && signingKeyFile) {
		signingKey = file(signingKeyFile.toString()).text
	}
	if (signingKey) {
		useInMemoryPgpKeys(signingKey.toString(), signingPassword?.toString() ?: "")
	}
	required {
		gradle.taskGraph.allTasks.any { task ->
			task.name == "publishToSonatype" ||
				task.name == "closeSonatypeStagingRepository" ||
				task.name == "releaseSonatypeStagingRepository" ||
				task.name == "closeAndReleaseSonatypeStagingRepository"
		}
	}
	sign(publishing.publications.mavenJava)
}

nexusPublishing {
	repositories {
		sonatype {
			nexusUrl.set(uri("https://ossrh-staging-api.central.sonatype.com/service/local/"))
			snapshotRepositoryUrl.set(uri("https://central.sonatype.com/repository/maven-snapshots/"))
			username.set((findProperty("sonatypeUsername") ?: localSecrets.getProperty("sonatypeUsername") ?: System.getenv("SONATYPE_USERNAME"))?.toString())
			password.set((findProperty("sonatypePassword") ?: localSecrets.getProperty("sonatypePassword") ?: System.getenv("SONATYPE_PASSWORD"))?.toString())
		}
	}
	transitionCheckOptions {
		maxRetries.set(180)
		delayBetween.set(Duration.ofSeconds(10))
	}
}

tasks.register("publishReleaseToCentral") {
	group = "publishing"
	description = "Publish signed artifacts to Sonatype and close/release staging repository."
	dependsOn("publishToSonatype", "closeAndReleaseSonatypeStagingRepository")
}
