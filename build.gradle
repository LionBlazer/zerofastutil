def patchGeneratedMapInterfaceZeroAllocApi = { File javaFile ->
	String source = javaFile.getText("UTF-8")
	if (!source.contains("public interface ")) return false
	if (source.contains("extends ZeroAllocIterable<") || source.contains("poolZeroAllocIterator()")) return false

	def packageMatcher = (source =~ /(?m)^package\s+([a-zA-Z0-9_.]+);/)
	if (!packageMatcher.find()) {
		throw new GradleException("Cannot find package declaration in ${javaFile}")
	}
	final String packageName = packageMatcher.group(1)

	def interfaceMatcher = (source =~ /public interface ([A-Za-z0-9_]+(?:<[^>]+>)?) extends ([^\{]+)\{/)
	if (!interfaceMatcher.find()) {
		return false
	}
	final String interfaceDecl = interfaceMatcher.group(0)
	final String extendsClause = interfaceMatcher.group(2).trim()
	if (!extendsClause.contains("Map<")) return false

	def entrySetMatcher = (source =~ /(?m)^\s*ObjectSet<([^;\n]+?)>\s+([A-Za-z0-9]+EntrySet)\(\);\s*$/)
	if (!entrySetMatcher.find()) {
		return false
	}
	final String entryType = entrySetMatcher.group(1).trim()
	final String entrySetMethod = entrySetMatcher.group(2).trim()

	final String patchedInterfaceDecl = interfaceDecl.replace(extendsClause, extendsClause + ", it.unimi.dsi.fastutil.ZeroAllocIterable<" + entryType + ">")
	source = source.substring(0, interfaceMatcher.start()) + patchedInterfaceDecl + source.substring(interfaceMatcher.end())

	final String zeroAllocMethods = """

	@Override
	default it.unimi.dsi.fastutil.objects.ObjectIterator<${entryType}> iterator() {
		return ${entrySetMethod}().iterator();
	}

	@Override
	default it.unimi.dsi.fastutil.ZeroAllocIterator<${entryType}> poolZeroAllocIterator() {
		return ${entrySetMethod}().poolZeroAllocIterator();
	}
"""

	entrySetMatcher = (source =~ /(?m)^\s*ObjectSet<([^;\n]+?)>\s+([A-Za-z0-9]+EntrySet)\(\);\s*$/)
	if (!entrySetMatcher.find()) {
		throw new GradleException("Cannot re-find entry set declaration in ${javaFile}")
	}
	source = source.substring(0, entrySetMatcher.end()) + zeroAllocMethods + source.substring(entrySetMatcher.end())
	source = shortenQualifiedTypeReferences.call(source, packageName)
	javaFile.write(source, "UTF-8")
	return true
}

def replaceFirstMethod = { String source, def signatureRegex, String replacement, File javaFile, String description ->
	def matcher = (source =~ signatureRegex)
	if (!matcher.find()) {
		throw new GradleException("Cannot find ${description} in ${javaFile}")
	}
	final int start = matcher.start()
	final int openingBrace = source.indexOf('{', matcher.end() - 1)
	if (openingBrace < 0) {
		throw new GradleException("Cannot find opening brace for ${description} in ${javaFile}")
	}
	final Map methodBody = extractBracedBody.call(source, openingBrace)
	return source.substring(0, start) + replacement + source.substring(methodBody.closingIndex + 1)
}

