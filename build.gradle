def isReferenceTypeCap = { String typeCap ->
	typeCap in ["Object", "Reference"]
}

def buildPrimitiveZeroAllocIteratorType = { String typeCap ->
	"it.unimi.dsi.fastutil.${typeCap.toLowerCase()}s.${typeCap}ZeroAllocIterator"
}

def buildElementZeroAllocIteratorType = { String typeCap, String javaTypeUse ->
	isReferenceTypeCap.call(typeCap) ? "it.unimi.dsi.fastutil.ZeroAllocIterator<${javaTypeUse}>" : buildPrimitiveZeroAllocIteratorType.call(typeCap)
}

def buildTypePackageName = { String typeCap ->
	if (isReferenceTypeCap.call(typeCap)) {
		return "it.unimi.dsi.fastutil.objects"
	}
	"it.unimi.dsi.fastutil.${typeCap.toLowerCase()}s"
}

def buildQualifiedTypeUse = { String packageName, String simpleName, String typeArgs, String currentPackage ->
	final String baseName = packageName == currentPackage ? simpleName : packageName + "." + simpleName
	baseName + typeArgs
}

def buildQualifiedClassRef = { String packageName, String simpleName, String currentPackage ->
	packageName == currentPackage ? simpleName : packageName + "." + simpleName
}

def buildOpenHashMapBaseName = { String ownerClass ->
	if (ownerClass.endsWith("LinkedOpenCustomHashMap")) {
		return ownerClass.substring(0, ownerClass.length() - "LinkedOpenCustomHashMap".length())
	}
	if (ownerClass.endsWith("LinkedOpenHashMap")) {
		return ownerClass.substring(0, ownerClass.length() - "LinkedOpenHashMap".length())
	}
	if (ownerClass.endsWith("OpenCustomHashMap")) {
		return ownerClass.substring(0, ownerClass.length() - "OpenCustomHashMap".length())
	}
	if (ownerClass.endsWith("OpenHashMap")) {
		return ownerClass.substring(0, ownerClass.length() - "OpenHashMap".length())
	}
	throw new GradleException("Unsupported OpenHashMap owner class: ${ownerClass}")
}

def parseMapTypeCaps = { String ownerClass ->
	final String baseName = buildOpenHashMapBaseName.call(ownerClass)
	final int separator = baseName.indexOf('2')
	if (separator < 0) {
		throw new GradleException("Cannot derive key/value type names from ${ownerClass}")
	}
	[
		keyTypeCap: baseName.substring(0, separator),
		valueTypeCap: baseName.substring(separator + 1)
	]
}

def buildMapComponentAccessor = { String typeCap, String component ->
	if (component == "key") {
		return isReferenceTypeCap.call(typeCap) ? "getKey()" : "get${typeCap}Key()"
	}
	if (component == "value") {
		return isReferenceTypeCap.call(typeCap) ? "getValue()" : "get${typeCap}Value()"
	}
	throw new GradleException("Unsupported map component: ${component}")
}

def buildZeroAllocMapProjectionIteratorClassName = { String ownerClass, String component ->
	final String baseName = buildOpenHashMapBaseName.call(ownerClass)
	final String variantSuffix
	if (ownerClass.endsWith("LinkedOpenCustomHashMap")) {
		variantSuffix = "LinkedCustom"
	} else if (ownerClass.endsWith("LinkedOpenHashMap")) {
		variantSuffix = "Linked"
	} else if (ownerClass.endsWith("OpenCustomHashMap")) {
		variantSuffix = "Custom"
	} else if (ownerClass.endsWith("OpenHashMap")) {
		variantSuffix = ""
	} else {
		throw new GradleException("Unsupported OpenHashMap owner class: ${ownerClass}")
	}
	final String suffix = (baseName == "Object2Object" && variantSuffix.isEmpty()) ? "" : baseName + variantSuffix
	final String prefix = component == "key" ? "ZeroAllocKeyIterator" : "ZeroAllocValueIterator"
	return suffix ? prefix + suffix : prefix
}

def extractBracedBody = { String source, int openingBraceIndex ->
	int depth = 0
	for (int i = openingBraceIndex; i < source.length(); i++) {
		final char ch = source.charAt(i)
		if (ch == '{') {
			depth++
		} else if (ch == '}') {
			depth--
			if (depth == 0) {
				return [
					body: source.substring(openingBraceIndex + 1, i),
					closingIndex: i
				]
			}
		}
	}
	throw new GradleException("Unbalanced braces while parsing generated source.")
}

def extractFirstTopLevelSegment = { String source, String separator ->
	if (separator == null || separator.length() != 1) {
		throw new GradleException("Separator must be exactly one character.")
	}
	final char separatorChar = separator.charAt(0)
	int angleDepth = 0
	for (int i = 0; i < source.length(); i++) {
		final char ch = source.charAt(i)
		if (ch == '<') {
			angleDepth++
		} else if (ch == '>') {
			angleDepth--
		} else if (ch == separatorChar && angleDepth == 0) {
			return source.substring(0, i).trim()
		}
	}
	return source.trim()
}

def extractTypeArgsFromTypeDecl = { String typeDecl ->
	if (!typeDecl) {
		return ""
	}
	def names = typeDecl.substring(1, typeDecl.length() - 1)
			.split(",")
			.collect { part ->
				part.trim()
						.replaceAll(/\s+extends\s+.*$/, "")
						.replaceAll(/\s+super\s+.*$/, "")
						.trim()
			}
	return "<" + names.join(", ") + ">"
}

def shortenQualifiedTypeReferences = { String source, String currentPackage ->
	final String originalSource = source
	def topLevelTypeMatcher = (source =~ /(?m)^\s*public\s+(?:final\s+|abstract\s+)?(?:class|interface|enum)\s+([A-Za-z0-9_]+)/)
	final String topLevelTypeName = topLevelTypeMatcher.find() ? topLevelTypeMatcher.group(1) : null
	final Map<String, String> replacements = [
		"it.unimi.dsi.fastutil.BigArrays"              : "BigArrays",
		"it.unimi.dsi.fastutil.ZeroAllocIterable"      : "ZeroAllocIterable",
		"it.unimi.dsi.fastutil.ZeroAllocIterator"      : "ZeroAllocIterator",
		"it.unimi.dsi.fastutil.objects.ObjectIterator" : "ObjectIterator",
		"java.util.ArrayDeque"                         : "ArrayDeque",
		"java.util.Iterator"                           : "Iterator",
		"java.util.Map"                                : "Map",
		"java.util.NoSuchElementException"             : "NoSuchElementException",
		"java.util.Objects"                            : "Objects"
	]
	final Set<String> importsToAdd = new LinkedHashSet<String>()
	final Set<String> existingImports = new LinkedHashSet<String>()

	source.eachLine { String line ->
		def importMatcher = (line =~ /^\s*import\s+([A-Za-z0-9_.]+);\s*$/)
		if (importMatcher.find()) {
			existingImports.add(importMatcher.group(1))
		}
	}

	final List<String> normalizedLines = source.readLines().findResults { String line ->
		def importMatcher = (line =~ /^\s*import\s+([A-Za-z0-9_.]+);\s*$/)
		if (importMatcher.find()) {
			final String importedType = importMatcher.group(1)
			final String importedSimpleName = importedType.substring(importedType.lastIndexOf('.') + 1)
			return importedSimpleName == topLevelTypeName ? null : line
		}

		String normalizedLine = line
		replacements.each { String fqn, String simpleName ->
			if (simpleName == topLevelTypeName) {
				return
			}
			if (normalizedLine.contains(fqn)) {
				normalizedLine = normalizedLine.replace(fqn, simpleName)
			}
		}
		normalizedLine
	}
	source = normalizedLines.join("\n")

	replacements.each { String fqn, String simpleName ->
		if (simpleName == topLevelTypeName) {
			return
		}
		if (!originalSource.contains(fqn)) {
			return
		}

		final int lastDot = fqn.lastIndexOf('.')
		if (lastDot < 0) {
			return
		}
		final String importPackage = fqn.substring(0, lastDot)
		if (importPackage == "java.lang" || importPackage == currentPackage) {
			return
		}
		if (!existingImports.contains(fqn)) {
			importsToAdd.add(fqn)
		}
	}

	if (importsToAdd.isEmpty()) {
		return source
	}

	def packageMatcher = (source =~ /(?m)^package\s+[a-zA-Z0-9_.]+;\s*/)
	if (!packageMatcher.find()) {
		throw new GradleException("Cannot find package declaration while shortening imports for ${currentPackage}")
	}

	final String importBlock = importsToAdd.toList().sort().collect { "import ${it};" }.join("\n")
	source.substring(0, packageMatcher.end()) + "\n" + importBlock + "\n" + source.substring(packageMatcher.end())
}

def extractInnerClassBody = { String source, String className, File javaFile ->
	def matcher = (source =~ ("private\\s+final\\s+class\\s+" + java.util.regex.Pattern.quote(className) + "\\b[^\\{]*\\{"))
	if (!matcher.find()) {
		throw new GradleException("Cannot find inner class ${className} in ${javaFile}")
	}
	final int openingBrace = source.indexOf('{', matcher.start())
	if (openingBrace < 0) {
		throw new GradleException("Cannot find opening brace for inner class ${className} in ${javaFile}")
	}
	final Map body = extractBracedBody.call(source, openingBrace)
	[
		start: matcher.start(),
		openingBrace: openingBrace,
		body: body.body,
		closingIndex: body.closingIndex,
		declaration: matcher.group(0)
	]
}

def parseIteratorMethodFromInnerClassBody = { String classBody, File javaFile, String className ->
	def matcher = (classBody =~ /@Override\s+public\s+([A-Za-z0-9_<>, ?\[\]]+)\s+(next[A-Za-z0-9_]*)\(\)\s*\{/)
	if (!matcher.find()) {
		throw new GradleException("Cannot find next* method in ${className} for ${javaFile}")
	}
	[
		returnType: matcher.group(1).trim(),
		methodName: matcher.group(2).trim()
	]
}

def normalizeZeroAllocIteratorInterface = { String iteratorInterface ->
	iteratorInterface
			.replace("BidirectionalIterator", "Iterator")
			.replace("ListIterator", "Iterator")
}

