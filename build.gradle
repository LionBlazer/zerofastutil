	"boolean": "Boolean",
	"byte": "Byte",
	"short": "Short",
	"char": "Character",
	"int": "Integer",
	"long": "Long",
	"float": "Float",
	"double": "Double"
]

def buildAllocFreeIteratorClassName = { String ownerClass ->
	final String baseName
	final String variantSuffix
	if (ownerClass.endsWith("LinkedOpenCustomHashMap")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "LinkedOpenCustomHashMap".length())
		variantSuffix = "LinkedCustom"
	} else if (ownerClass.endsWith("LinkedOpenHashMap")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "LinkedOpenHashMap".length())
		variantSuffix = "Linked"
	} else if (ownerClass.endsWith("OpenCustomHashMap")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "OpenCustomHashMap".length())
		variantSuffix = "Custom"
	} else if (ownerClass.endsWith("OpenHashMap")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "OpenHashMap".length())
		variantSuffix = ""
	} else {
		throw new GradleException("Unsupported OpenHashMap owner class: ${ownerClass}")
	}

	if (baseName == "Object2Object" && variantSuffix.isEmpty()) {
		return "AllocFreeEntryIterator"
	}
	return "AllocFreeEntryIterator${baseName}${variantSuffix}"
}

def isGeneratedOpenHashMapFile = { File javaFile ->
	def name = javaFile.name
	name.contains("2") && openHashMapDriverSuffixes.any { name.endsWith(it) }
}

def extractBracedBody = { String source, int openingBraceIndex ->
	int depth = 0
	for (int i = openingBraceIndex; i < source.length(); i++) {
		final char ch = source.charAt(i)
		if (ch == '{') {
			depth++
		} else if (ch == '}') {
			depth--
			if (depth == 0) {
				return [
					body: source.substring(openingBraceIndex + 1, i),
					closingIndex: i
				]
			}
		}
	}
	throw new GradleException("Unbalanced braces while parsing generated source.")
}

def extractFirstTopLevelSegment = { String source, String separator ->
	if (separator == null || separator.length() != 1) {
		throw new GradleException("Separator must be exactly one character.")
	}
	final char separatorChar = separator.charAt(0)
	int angleDepth = 0
	for (int i = 0; i < source.length(); i++) {
		final char ch = source.charAt(i)
		if (ch == '<') {
			angleDepth++
		} else if (ch == '>') {
			angleDepth--
		} else if (ch == separatorChar && angleDepth == 0) {
			return source.substring(0, i).trim()
		}
	}
	return source.trim()
}

def parseOpenHashMapMetadata = { File javaFile ->
	String source = javaFile.getText("UTF-8")
	final String ownerClass = javaFile.name.substring(0, javaFile.name.length() - ".java".length())
	final boolean linked = javaFile.name.contains("LinkedOpen")
	final String iteratorClass = buildAllocFreeIteratorClassName(ownerClass)

	def packageMatcher = (source =~ /(?m)^package\s+([a-zA-Z0-9_.]+);/)
	if (!packageMatcher.find()) {
		throw new GradleException("Cannot find package declaration in ${javaFile}")
	}
	final String packageName = packageMatcher.group(1)

	def classDeclMatcher = (source =~ ("public class\\s+" + java.util.regex.Pattern.quote(ownerClass) + "\\s*(<[^>]+>)?\\s+extends"))
	if (!classDeclMatcher.find()) {
		throw new GradleException("Cannot find class declaration for ${ownerClass} in ${javaFile}")
	}
	final String typeDecl = classDeclMatcher.group(1) ?: ""

	String typeArgs = ""
	if (typeDecl) {
		def names = typeDecl.substring(1, typeDecl.length() - 1)
				.split(",")
				.collect { part ->
					part.trim()
							.replaceAll(/\s+extends\s+.*$/, "")
							.replaceAll(/\s+super\s+.*$/, "")
							.trim()
				}
		typeArgs = "<" + names.join(", ") + ">"
	}
	final String ownerTypeUse = ownerClass + typeArgs
	final String iteratorTypeUse = iteratorClass + typeArgs

	def mapEntryMatcher = (source =~ /final class MapEntry implements\s+([^\{]+)\{/)
	if (!mapEntryMatcher.find()) {
		throw new GradleException("Cannot find MapEntry declaration in ${javaFile}")
	}
	final String mapEntryInterfaces = mapEntryMatcher.group(1).trim()
	final String entryType = extractFirstTopLevelSegment(mapEntryInterfaces, ',')
	final int mapEntryOpeningBrace = source.indexOf('{', mapEntryMatcher.start())
	if (mapEntryOpeningBrace < 0) {
		throw new GradleException("Cannot find MapEntry opening brace in ${javaFile}")
	}
	final String mapEntryBody = extractBracedBody(source, mapEntryOpeningBrace).body
	final String pooledMapEntryBody = mapEntryBody
			.replaceAll(/(?m)\bMapEntry\s*\(/, "EntryView(")
			.replaceAll(/\bkey\[/, "owner.key[")
			.replaceAll(/\bvalue\[/, "owner.value[")
			.replaceAll(/\bstrategy\b/, "owner.strategy")

	String keyType = null
	String keyIsNullExpression = null
	if (!linked) {
		def keyTypeMatcher = (source =~ /protected transient ([^;]+?) key;/)
		if (!keyTypeMatcher.find()) {
			throw new GradleException("Cannot find key field type in ${javaFile}")
		}
		keyType = keyTypeMatcher.group(1).trim()

		def keyNullMatcher = (source =~ /if \(!(.+)\) return last = pos;/)
		if (!keyNullMatcher.find()) {
			throw new GradleException("Cannot find key null-check expression in ${javaFile}")
		}
		keyIsNullExpression = keyNullMatcher.group(1).trim()
	}

	return [
		source: source,
		ownerClass: ownerClass,
		linked: linked,
		packageName: packageName,
		typeDecl: typeDecl,
		typeArgs: typeArgs,
		ownerTypeUse: ownerTypeUse,
		entryType: entryType,
		mapEntryInterfaces: mapEntryInterfaces,
		pooledMapEntryBody: pooledMapEntryBody,
		iteratorClass: iteratorClass,
		iteratorTypeUse: iteratorTypeUse,
		keyType: keyType,
		keyIsNullExpression: keyIsNullExpression
	]
}

def buildAllocFreeIteratorClassSource = { Map meta ->
	final String staticTypeParams = meta.typeDecl ? meta.typeDecl + " " : ""
	final String entryView = """
		private final class EntryView implements ${meta.mapEntryInterfaces} {
${meta.pooledMapEntryBody}
		}
"""

	final String core = meta.linked ? """
		private static final int NEXT_UNKNOWN = Integer.MIN_VALUE;
		private static final int NEXT_NONE = -1;
		private static final ThreadLocal<java.util.ArrayDeque<${meta.iteratorClass}>> POOL = ThreadLocal.withInitial(java.util.ArrayDeque::new);

		private ${meta.ownerTypeUse} owner;
		private final EntryView entry = new EntryView();

		private boolean inUse;
		private int expectedSize;
		private int nextIndex = NEXT_UNKNOWN;
		private int scanNext;

		@SuppressWarnings("unchecked")
		static ${staticTypeParams}${meta.iteratorTypeUse} acquire(final ${meta.ownerTypeUse} owner) {
			final java.util.ArrayDeque<${meta.iteratorClass}> pool = POOL.get();
			${meta.iteratorClass} iterator = pool.pollFirst();
			if (iterator == null) iterator = new ${meta.iteratorClass}${meta.typeArgs}();
			iterator.open(owner);
			return (${meta.iteratorTypeUse})iterator;
		}

		void open(final ${meta.ownerTypeUse} owner) {
			if (inUse) throw new IllegalStateException("Iterator already in use.");
			this.owner = owner;
			inUse = true;
			expectedSize = owner.size;
			nextIndex = NEXT_UNKNOWN;
			entry.index = -1;
			scanNext = owner.first;
		}

		private void ensureOpenAndUnmodified() {
			if (!inUse) throw new IllegalStateException("Iterator is not in use.");
			if (expectedSize != owner.size) throw new IllegalStateException("Map was structurally modified during alloc-free iteration.");
		}

		private void computeNext() {
			if (nextIndex != NEXT_UNKNOWN) return;
			if (scanNext == -1) {
				nextIndex = NEXT_NONE;
				return;
			}
			nextIndex = scanNext;
			scanNext = (int)owner.link[scanNext];
		}

		@Override
		public boolean hasNext() {
			ensureOpenAndUnmodified();
			computeNext();
			return nextIndex != NEXT_NONE;
		}

		@Override
		public ${meta.entryType} next() {
			ensureOpenAndUnmodified();
			computeNext();
			if (nextIndex == NEXT_NONE) throw new NoSuchElementException();
			entry.index = nextIndex;
			nextIndex = NEXT_UNKNOWN;
			return entry;
		}

		@Override
		public void remove() {
			throw new UnsupportedOperationException("remove");
		}

		@Override
		public java.util.Iterator<${meta.entryType}> iterator() {
			ensureOpenAndUnmodified();
			return this;
		}

		@Override
		public void close() {
			if (!inUse) throw new IllegalStateException("Iterator is not in use.");
			inUse = false;
			nextIndex = NEXT_UNKNOWN;
			entry.index = -1;
			owner = null;
			POOL.get().offerFirst(this);
		}
${entryView}
""" : """
		private static final int NEXT_UNKNOWN = Integer.MIN_VALUE;
		private static final int NEXT_NONE = -1;
		private static final ThreadLocal<java.util.ArrayDeque<${meta.iteratorClass}>> POOL = ThreadLocal.withInitial(java.util.ArrayDeque::new);

		private ${meta.ownerTypeUse} owner;
		private final EntryView entry = new EntryView();

		private boolean inUse;
		private int expectedSize;
		private int nextIndex = NEXT_UNKNOWN;
		private int scanPos;
		private boolean scanNullKey;

		@SuppressWarnings("unchecked")
		static ${staticTypeParams}${meta.iteratorTypeUse} acquire(final ${meta.ownerTypeUse} owner) {
			final java.util.ArrayDeque<${meta.iteratorClass}> pool = POOL.get();
			${meta.iteratorClass} iterator = pool.pollFirst();
			if (iterator == null) iterator = new ${meta.iteratorClass}${meta.typeArgs}();
			iterator.open(owner);
			return (${meta.iteratorTypeUse})iterator;
		}

		void open(final ${meta.ownerTypeUse} owner) {
			if (inUse) throw new IllegalStateException("Iterator already in use.");
			this.owner = owner;
			inUse = true;
			expectedSize = owner.size;
			nextIndex = NEXT_UNKNOWN;
			entry.index = -1;
			scanPos = owner.n;
			scanNullKey = owner.containsNullKey;
		}

		private void ensureOpenAndUnmodified() {
			if (!inUse) throw new IllegalStateException("Iterator is not in use.");
			if (expectedSize != owner.size) throw new IllegalStateException("Map was structurally modified during alloc-free iteration.");
		}

		private void computeNext() {
			if (nextIndex != NEXT_UNKNOWN) return;
			if (scanNullKey) {
				scanNullKey = false;
				nextIndex = owner.n;
				return;
			}
			final ${meta.keyType} key = owner.key;
			while (scanPos != 0) {
				final int pos = --scanPos;
				if (!(${meta.keyIsNullExpression})) {
					nextIndex = pos;
					return;
				}
			}
			nextIndex = NEXT_NONE;
		}

		@Override
		public boolean hasNext() {
			ensureOpenAndUnmodified();
			computeNext();
			return nextIndex != NEXT_NONE;
		}

		@Override
		public ${meta.entryType} next() {
			ensureOpenAndUnmodified();
			computeNext();
			if (nextIndex == NEXT_NONE) throw new NoSuchElementException();
			entry.index = nextIndex;
			nextIndex = NEXT_UNKNOWN;
			return entry;
		}

		@Override
		public void remove() {
			throw new UnsupportedOperationException("remove");
		}

		@Override
		public java.util.Iterator<${meta.entryType}> iterator() {
			ensureOpenAndUnmodified();
			return this;
		}

		@Override
		public void close() {
			if (!inUse) throw new IllegalStateException("Iterator is not in use.");
			inUse = false;
			nextIndex = NEXT_UNKNOWN;
			entry.index = -1;
			owner = null;
			POOL.get().offerFirst(this);
		}
${entryView}
"""

	return """package ${meta.packageName};

import java.util.NoSuchElementException;
import java.util.Map;

/** Reusable, allocation-free entry iterator for {@link ${meta.ownerClass}}. */
public final class ${meta.iteratorClass}${meta.typeDecl} implements java.util.Iterator<${meta.entryType}>, AutoCloseable, Iterable<${meta.entryType}> {
${core}
}
"""
}

def injectAllocFreeIteratorApi = { File javaFile, Map meta ->
	String source = meta.source
	if (source.contains("poolAllocFreeIterator()") && source.contains(meta.iteratorClass)) {
		return false
	}

	final String allocFreeMethods = """
	/** Borrows an allocation-free pooled entry iterator.
	 *
	 * <p>The iterator must be closed after use to return it back to the current thread pool.
	 */
	public ${meta.iteratorTypeUse} poolAllocFreeIterator() {
		return ${meta.iteratorClass}.acquire(this);
	}
"""

	final int marker = source.indexOf("\n\tprivate abstract class MapIterator<")
	if (marker < 0) {
		throw new GradleException("Cannot find MapIterator section in ${javaFile}")
	}

	source = source.substring(0, marker) + "\n\n" + allocFreeMethods + "\n" + source.substring(marker)
	javaFile.write(source, "UTF-8")
	return true
}

def buildAllocFreeSetIteratorClassName = { String ownerClass ->
	final String baseName
	final String variantSuffix
	if (ownerClass.endsWith("LinkedOpenCustomHashSet")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "LinkedOpenCustomHashSet".length())
		variantSuffix = "LinkedCustom"
	} else if (ownerClass.endsWith("LinkedOpenHashSet")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "LinkedOpenHashSet".length())
		variantSuffix = "Linked"
	} else if (ownerClass.endsWith("OpenCustomHashSet")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "OpenCustomHashSet".length())
		variantSuffix = "Custom"
	} else if (ownerClass.endsWith("OpenHashBigSet")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "OpenHashBigSet".length())
		variantSuffix = "Big"
	} else if (ownerClass.endsWith("OpenHashSet")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "OpenHashSet".length())
		variantSuffix = ""
	} else {
		throw new GradleException("Unsupported OpenHashSet owner class: ${ownerClass}")
	}

	if (baseName == "Object" && variantSuffix.isEmpty()) {
		return "AllocFreeIterator"
	}
	return "AllocFreeIterator${baseName}${variantSuffix}"
}

def isGeneratedOpenHashSetFile = { File javaFile ->
	final String name = javaFile.name
	!name.contains("2") && openHashSetDriverSuffixes.any { name.endsWith(it) }
}

def parseOpenHashSetMetadata = { File javaFile ->
	final String source = javaFile.getText("UTF-8")
	final String ownerClass = javaFile.name.substring(0, javaFile.name.length() - ".java".length())
	final boolean linked = ownerClass.contains("LinkedOpen")
	final boolean big = ownerClass.endsWith("OpenHashBigSet")
	final String iteratorClass = buildAllocFreeSetIteratorClassName(ownerClass)

	def packageMatcher = (source =~ /(?m)^package\s+([a-zA-Z0-9_.]+);/)
	if (!packageMatcher.find()) {
		throw new GradleException("Cannot find package declaration in ${javaFile}")
	}
	final String packageName = packageMatcher.group(1)

	def classDeclMatcher = (source =~ ("public class\\s+" + java.util.regex.Pattern.quote(ownerClass) + "\\s*(<[^>]+>)?\\s+extends"))
	if (!classDeclMatcher.find()) {
		throw new GradleException("Cannot find class declaration for ${ownerClass} in ${javaFile}")
	}
	final String typeDecl = classDeclMatcher.group(1) ?: ""

	String typeArgs = ""
	if (typeDecl) {
		def names = typeDecl.substring(1, typeDecl.length() - 1)
				.split(",")
				.collect { part ->
					part.trim()
							.replaceAll(/\s+extends\s+.*$/, "")
							.replaceAll(/\s+super\s+.*$/, "")
							.trim()
				}
		typeArgs = "<" + names.join(", ") + ">"
	}

	final String ownerTypeUse = ownerClass + typeArgs
	final String iteratorTypeUse = iteratorClass + typeArgs

	def setIteratorMatcher = (source =~ /private(?:\s+final)?\s+class\s+SetIterator\s+implements\s+([^\{]+)\{/)
	if (!setIteratorMatcher.find()) {
		throw new GradleException("Cannot find SetIterator declaration in ${javaFile}")
	}
	final String setIteratorInterfaceRaw = setIteratorMatcher.group(1).trim()
	final int setIteratorOpeningBrace = source.indexOf('{', setIteratorMatcher.start())
	if (setIteratorOpeningBrace < 0) {
		throw new GradleException("Cannot find SetIterator opening brace in ${javaFile}")
	}
	final String setIteratorBody = extractBracedBody(source, setIteratorOpeningBrace).body
	final String iteratorInterface = setIteratorInterfaceRaw.replace("ListIterator", "Iterator").trim()

	def nextMethodMatcher = (setIteratorBody =~ /@Override\s+public\s+([A-Za-z0-9_<>, ?]+)\s+(next[A-Za-z0-9_]*)\(\)\s*\{/)
	if (!nextMethodMatcher.find()) {
		throw new GradleException("Cannot find next* method in SetIterator for ${javaFile}")
	}
	final String nextReturnType = nextMethodMatcher.group(1).trim()
	final String nextMethod = nextMethodMatcher.group(2).trim()
	final String iterableType = nextMethod == "next" ? nextReturnType : (primitiveToBoxedType[nextReturnType] ?: nextReturnType)

	String keyType = null
	String keyIsNullExpression = null
	String bigElementType = null
	String nullKeyReturnExpression = "owner.key[owner.n]"
	if (!linked) {
		def keyTypeMatcher = (source =~ /protected transient ([^;]+?) key;/)
		if (!keyTypeMatcher.find()) {
			throw new GradleException("Cannot find key field type in ${javaFile}")
		}
		keyType = keyTypeMatcher.group(1).trim()

		def keyNullMatcher = (setIteratorBody =~ /if \(!(.+?)\)\s*(?:return|\{)/)
		while (keyNullMatcher.find()) {
			final String candidate = keyNullMatcher.group(1).trim()
			if (candidate.contains("key[pos]") || (candidate =~ /(^|[^A-Za-z0-9_])k([^A-Za-z0-9_]|$)/).find()) {
				keyIsNullExpression = candidate
				break
			}
		}
		if (!keyIsNullExpression) {
			throw new GradleException("Cannot find key null-check expression in SetIterator for ${javaFile}")
		}

		if (big) {
			if (!keyType.endsWith("[][]")) {
				throw new GradleException("Expected big-set key type to be [][] in ${javaFile}, got ${keyType}")
			}
			bigElementType = keyType.substring(0, keyType.length() - 4).trim()
			def nullReturnMatcher = (setIteratorBody =~ /if \(mustReturnNull\)\s*\{\s*mustReturnNull = false;\s*last = n;\s*return ([^;]+);/)
			if (nullReturnMatcher.find()) {
				nullKeyReturnExpression = nullReturnMatcher.group(1).trim()
			}
		}
	}

	return [
		source: source,
		ownerClass: ownerClass,
		linked: linked,
		big: big,
		packageName: packageName,
		typeDecl: typeDecl,
		typeArgs: typeArgs,
		ownerTypeUse: ownerTypeUse,
		iteratorClass: iteratorClass,
		iteratorTypeUse: iteratorTypeUse,
		iteratorInterface: iteratorInterface,
		nextReturnType: nextReturnType,
		nextMethod: nextMethod,
		iterableType: iterableType,
		keyType: keyType,
		keyIsNullExpression: keyIsNullExpression,
		bigElementType: bigElementType,
		nullKeyReturnExpression: nullKeyReturnExpression
	]
}

def buildAllocFreeSetIteratorClassSource = { Map meta ->
	final String staticTypeParams = meta.typeDecl ? meta.typeDecl + " " : ""

	final String core = meta.linked ? """
		private static final int NEXT_UNKNOWN = Integer.MIN_VALUE;
