def insertAfterOpeningBrace = { String source, int openingBraceIndex, String insertion ->
	source.substring(0, openingBraceIndex + 1) + "\n" + insertion + source.substring(openingBraceIndex + 1)
}

def buildPackageDirectory = { File rootDir, String packageName ->
	new File(rootDir, packageName.replace('.', '/'))
}

def buildZeroAllocIteratorClassName = { String ownerClass ->
	final String baseName
	final String variantSuffix
	if (ownerClass.endsWith("LinkedOpenCustomHashMap")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "LinkedOpenCustomHashMap".length())
		variantSuffix = "LinkedCustom"
	} else if (ownerClass.endsWith("LinkedOpenHashMap")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "LinkedOpenHashMap".length())
		variantSuffix = "Linked"
	} else if (ownerClass.endsWith("OpenCustomHashMap")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "OpenCustomHashMap".length())
		variantSuffix = "Custom"
	} else if (ownerClass.endsWith("OpenHashMap")) {
		baseName = ownerClass.substring(0, ownerClass.length() - "OpenHashMap".length())
		variantSuffix = ""
	} else {
		throw new GradleException("Unsupported OpenHashMap owner class: ${ownerClass}")
	}

	if (baseName == "Object2Object" && variantSuffix.isEmpty()) {
		return "ZeroAllocEntryIterator"
	}
	return "ZeroAllocEntryIterator${baseName}${variantSuffix}"
}

def isGeneratedOpenHashMapFile = { File javaFile ->
	def name = javaFile.name
	name.contains("2") && openHashMapDriverSuffixes.any { name.endsWith(it) }
}

def parseOpenHashMapMetadata = { File javaFile ->
	String source = javaFile.getText("UTF-8")
	final String ownerClass = javaFile.name.substring(0, javaFile.name.length() - ".java".length())
	final boolean linked = javaFile.name.contains("LinkedOpen")
	final String iteratorClass = buildZeroAllocIteratorClassName.call(ownerClass)
	final Map typeCaps = parseMapTypeCaps.call(ownerClass)
	final String keyTypeCap = typeCaps.keyTypeCap
	final String valueTypeCap = typeCaps.valueTypeCap
	final String keyAccessor = buildMapComponentAccessor.call(keyTypeCap, "key")
	final String valueAccessor = buildMapComponentAccessor.call(valueTypeCap, "value")
	final String keyProjectionIteratorClass = buildZeroAllocMapProjectionIteratorClassName.call(ownerClass, "key")
	final String valueProjectionIteratorClass = buildZeroAllocMapProjectionIteratorClassName.call(ownerClass, "value")

	def packageMatcher = (source =~ /(?m)^package\s+([a-zA-Z0-9_.]+);/)
	if (!packageMatcher.find()) {
		throw new GradleException("Cannot find package declaration in ${javaFile}")
	}
	final String packageName = packageMatcher.group(1)

	def classDeclMatcher = (source =~ ("public class\\s+" + java.util.regex.Pattern.quote(ownerClass) + "\\s*(<[^>]+>)?\\s+extends"))
	if (!classDeclMatcher.find()) {
		throw new GradleException("Cannot find class declaration for ${ownerClass} in ${javaFile}")
	}
	final String typeDecl = classDeclMatcher.group(1) ?: ""

	final String typeArgs = extractTypeArgsFromTypeDecl.call(typeDecl)
	final String keyProjectionPackageName = packageName
	final String valueProjectionPackageName = isReferenceTypeCap.call(valueTypeCap) ? packageName : buildTypePackageName.call(valueTypeCap)
	final String ownerTypeUse = ownerClass + typeArgs
	final String iteratorTypeUse = iteratorClass + typeArgs
	final String keyProjectionIteratorTypeUse = buildQualifiedTypeUse.call(keyProjectionPackageName, keyProjectionIteratorClass, typeArgs, packageName)
	final String valueProjectionIteratorTypeUse = buildQualifiedTypeUse.call(valueProjectionPackageName, valueProjectionIteratorClass, typeArgs, packageName)
	final String keyProjectionIteratorRef = buildQualifiedClassRef.call(keyProjectionPackageName, keyProjectionIteratorClass, packageName)
	final String valueProjectionIteratorRef = buildQualifiedClassRef.call(valueProjectionPackageName, valueProjectionIteratorClass, packageName)

	def mapEntryMatcher = (source =~ /final class MapEntry implements\s+([^\{]+)\{/)
	if (!mapEntryMatcher.find()) {
		throw new GradleException("Cannot find MapEntry declaration in ${javaFile}")
	}
	final String mapEntryInterfaces = mapEntryMatcher.group(1).trim()
	final String entryType = extractFirstTopLevelSegment.call(mapEntryInterfaces, ',')
	final int mapEntryOpeningBrace = source.indexOf('{', mapEntryMatcher.start())
	if (mapEntryOpeningBrace < 0) {
		throw new GradleException("Cannot find MapEntry opening brace in ${javaFile}")
	}
	final String mapEntryBody = extractBracedBody.call(source, mapEntryOpeningBrace).body
	final String pooledMapEntryBody = mapEntryBody
			.replaceAll(/(?m)\bMapEntry\s*\(/, "EntryView(")
			.replaceAll(/\bkey\[/, "owner.key[")
			.replaceAll(/\bvalue\[/, "owner.value[")
			.replaceAll(/\bstrategy\b/, "owner.strategy")

	final Map keyIteratorInner = extractInnerClassBody.call(source, "KeyIterator", javaFile)
	def keyIteratorInterfaceMatcher = (keyIteratorInner.declaration =~ /implements\s+([^\{]+)\{/)
	if (!keyIteratorInterfaceMatcher.find()) {
		throw new GradleException("Cannot find KeyIterator interface declaration in ${javaFile}")
	}
	final String keyIteratorInterface = normalizeZeroAllocIteratorInterface.call(keyIteratorInterfaceMatcher.group(1).trim())
	final Map keyIteratorMethod = parseIteratorMethodFromInnerClassBody.call(keyIteratorInner.body, javaFile, "KeyIterator")
	final String keyZeroAllocIteratorType = buildElementZeroAllocIteratorType.call(keyTypeCap, keyIteratorMethod.returnType)
	final boolean keyIteratorImplementsIterable = isReferenceTypeCap.call(keyTypeCap)

	final Map valueIteratorInner = extractInnerClassBody.call(source, "ValueIterator", javaFile)
	def valueIteratorInterfaceMatcher = (valueIteratorInner.declaration =~ /implements\s+([^\{]+)\{/)
	if (!valueIteratorInterfaceMatcher.find()) {
		throw new GradleException("Cannot find ValueIterator interface declaration in ${javaFile}")
	}
	final String valueIteratorInterface = normalizeZeroAllocIteratorInterface.call(valueIteratorInterfaceMatcher.group(1).trim())
	final Map valueIteratorMethod = parseIteratorMethodFromInnerClassBody.call(valueIteratorInner.body, javaFile, "ValueIterator")
	final String valueZeroAllocIteratorType = buildElementZeroAllocIteratorType.call(valueTypeCap, valueIteratorMethod.returnType)
	final boolean valueIteratorImplementsIterable = isReferenceTypeCap.call(valueTypeCap)

	String keyType = null
	String keyIsNullExpression = null
	if (!linked) {
		def keyTypeMatcher = (source =~ /protected transient ([^;]+?) key;/)
		if (!keyTypeMatcher.find()) {
			throw new GradleException("Cannot find key field type in ${javaFile}")
		}
		keyType = keyTypeMatcher.group(1).trim()

		def keyNullMatcher = (source =~ /if \(!(.+)\) return last = pos;/)
		if (!keyNullMatcher.find()) {
			throw new GradleException("Cannot find key null-check expression in ${javaFile}")
		}
		keyIsNullExpression = keyNullMatcher.group(1).trim()
	}

	return [
		source: source,
		ownerClass: ownerClass,
		linked: linked,
		packageName: packageName,
		typeDecl: typeDecl,
		typeArgs: typeArgs,
		ownerTypeUse: ownerTypeUse,
		entryType: entryType,
		mapEntryInterfaces: mapEntryInterfaces,
		pooledMapEntryBody: pooledMapEntryBody,
		iteratorClass: iteratorClass,
		iteratorTypeUse: iteratorTypeUse,
		keyTypeCap: keyTypeCap,
		valueTypeCap: valueTypeCap,
		keyAccessor: keyAccessor,
		valueAccessor: valueAccessor,
		keyProjectionIteratorClass: keyProjectionIteratorClass,
		valueProjectionIteratorClass: valueProjectionIteratorClass,
		keyProjectionPackageName: keyProjectionPackageName,
		valueProjectionPackageName: valueProjectionPackageName,
		keyProjectionIteratorTypeUse: keyProjectionIteratorTypeUse,
		valueProjectionIteratorTypeUse: valueProjectionIteratorTypeUse,
		keyProjectionIteratorRef: keyProjectionIteratorRef,
		valueProjectionIteratorRef: valueProjectionIteratorRef,
		keyIteratorInterface: keyIteratorInterface,
		valueIteratorInterface: valueIteratorInterface,
		keyIteratorReturnType: keyIteratorMethod.returnType,
		valueIteratorReturnType: valueIteratorMethod.returnType,
		keyIteratorMethod: keyIteratorMethod.methodName,
		valueIteratorMethod: valueIteratorMethod.methodName,
		keyZeroAllocIteratorType: keyZeroAllocIteratorType,
		valueZeroAllocIteratorType: valueZeroAllocIteratorType,
		keyIteratorImplementsIterable: keyIteratorImplementsIterable,
		valueIteratorImplementsIterable: valueIteratorImplementsIterable,
		keyType: keyType,
		keyIsNullExpression: keyIsNullExpression
	]
}

def buildZeroAllocIteratorClassSource = { Map meta ->
	final String staticTypeParams = meta.typeDecl ? meta.typeDecl + " " : ""
	final String entryView = """
		private final class EntryView implements ${meta.mapEntryInterfaces} {
${meta.pooledMapEntryBody}
		}
"""

	final String core = meta.linked ? """
		private static final int NEXT_UNKNOWN = Integer.MIN_VALUE;
		private static final int NEXT_NONE = -1;
		private static final ThreadLocal<ArrayDeque<${meta.iteratorClass}>> POOL = ThreadLocal.withInitial(ArrayDeque::new);

		private ${meta.ownerTypeUse} owner;
		private final EntryView entry = new EntryView();

		private boolean inUse;
		private int expectedSize;
		private int nextIndex = NEXT_UNKNOWN;
		private int scanNext;

		@SuppressWarnings("unchecked")
		static ${staticTypeParams}${meta.iteratorTypeUse} acquire(final ${meta.ownerTypeUse} owner) {
			final ArrayDeque<${meta.iteratorClass}> pool = POOL.get();
			${meta.iteratorClass} iterator = pool.pollFirst();
			if (iterator == null) iterator = new ${meta.iteratorClass}${meta.typeArgs}();
			iterator.open(owner);
			return (${meta.iteratorTypeUse})iterator;
		}

		void open(final ${meta.ownerTypeUse} owner) {
			if (inUse) throw new IllegalStateException("Iterator already in use.");
			this.owner = owner;
			inUse = true;
			expectedSize = owner.size;
			nextIndex = NEXT_UNKNOWN;
			entry.index = -1;
			scanNext = owner.first;
		}

		private void ensureOpenAndUnmodified() {
			if (!inUse) throw new IllegalStateException("Iterator is not in use.");
			if (expectedSize != owner.size) throw new IllegalStateException("Map was structurally modified during zero-alloc iteration.");
		}

		private void computeNext() {
			if (nextIndex != NEXT_UNKNOWN) return;
			if (scanNext == -1) {
				nextIndex = NEXT_NONE;
				return;
			}
			nextIndex = scanNext;
			scanNext = (int)owner.link[scanNext];
		}

		@Override
		public boolean hasNext() {
			ensureOpenAndUnmodified();
			computeNext();
			return nextIndex != NEXT_NONE;
		}

		@Override
		public ${meta.entryType} next() {
			ensureOpenAndUnmodified();
			computeNext();
			if (nextIndex == NEXT_NONE) throw new NoSuchElementException();
			entry.index = nextIndex;
			nextIndex = NEXT_UNKNOWN;
			return entry;
		}

		@Override
		public void remove() {
			throw new UnsupportedOperationException("remove");
		}

		@Override
		public it.unimi.dsi.fastutil.objects.ObjectIterator<${meta.entryType}> iterator() {
			ensureOpenAndUnmodified();
			return this;
		}

		@Override
		public void close() {
			if (!inUse) throw new IllegalStateException("Iterator is not in use.");
			inUse = false;
			nextIndex = NEXT_UNKNOWN;
			entry.index = -1;
			owner = null;
			POOL.get().offerFirst(this);
		}
${entryView}
""" : """
		private static final int NEXT_UNKNOWN = Integer.MIN_VALUE;
		private static final int NEXT_NONE = -1;
		private static final ThreadLocal<ArrayDeque<${meta.iteratorClass}>> POOL = ThreadLocal.withInitial(ArrayDeque::new);

		private ${meta.ownerTypeUse} owner;
		private final EntryView entry = new EntryView();

		private boolean inUse;
		private int expectedSize;
		private int nextIndex = NEXT_UNKNOWN;
		private int scanPos;
		private boolean scanNullKey;

		@SuppressWarnings("unchecked")
		static ${staticTypeParams}${meta.iteratorTypeUse} acquire(final ${meta.ownerTypeUse} owner) {
			final ArrayDeque<${meta.iteratorClass}> pool = POOL.get();
			${meta.iteratorClass} iterator = pool.pollFirst();
			if (iterator == null) iterator = new ${meta.iteratorClass}${meta.typeArgs}();
			iterator.open(owner);
			return (${meta.iteratorTypeUse})iterator;
		}

		void open(final ${meta.ownerTypeUse} owner) {
			if (inUse) throw new IllegalStateException("Iterator already in use.");
			this.owner = owner;
			inUse = true;
			expectedSize = owner.size;
			nextIndex = NEXT_UNKNOWN;
			entry.index = -1;
			scanPos = owner.n;
			scanNullKey = owner.containsNullKey;
		}

		private void ensureOpenAndUnmodified() {
			if (!inUse) throw new IllegalStateException("Iterator is not in use.");
